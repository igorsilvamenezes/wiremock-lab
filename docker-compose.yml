version: '3.9'

services:

  wiremock:
    image: wiremock/wiremock:3.5.4
    container_name: wiremock-server
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings
      - ./wiremock/__files:/home/wiremock/__files
    command: >
      --port 8080
      --verbose
      --global-response-templating
    networks:
      - lab-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/__admin/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  app-tests:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: app-integration-tests
    depends_on:
      wiremock:
        condition: service_healthy
    environment:
      WIREMOCK_BASE_URL: http://wiremock-server:8080
    networks:
      - lab-network
    volumes:
      - ./reports:/app/target/surefire-reports

networks:
  lab-network:
    driver: bridge